<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>何泽宇 | Strategy & Investment Portfolio</title>
    <meta
      name="description"
      content="何泽宇的个人网站，展示战略、投资、商业分析与 AI 应用相关经历，用于实习投递。"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <nav class="topbar">
          <span class="brand">He Zeyu</span>
          <div class="topbar-links">
            <a href="#projects">项目</a>
            <a href="#skills">能力</a>
            <a href="#contact">联系</a>
          </div>
        </nav>

        <div class="hero-grid">
          <section class="hero-copy">
            <p class="eyebrow">Internship Portfolio</p>
            <h1>何泽宇</h1>
            <p id="hero-summary" class="hero-summary"></p>
            <div class="hero-actions">
              <a id="email-link" class="button button-primary" href="#">邮件联系</a>
              <a
                id="resume-link"
                class="button button-secondary"
                href="#"
                target="_blank"
                rel="noreferrer"
                >查看简历</a
              >
            </div>
            <ul id="hero-metrics" class="metrics"></ul>
          </section>

          <aside class="hero-card">
            <p class="card-label">Quick Facts</p>
            <div id="quick-facts" class="quick-facts"></div>
          </aside>
        </div>
      </header>

      <main>
        <section class="section intro" id="about">
          <div class="section-heading">
            <p class="eyebrow">Profile</p>
            <h2>我能提供的价值</h2>
          </div>
          <div class="intro-panel">
            <p id="about-text"></p>
          </div>
        </section>

        <section class="section" id="projects">
          <div class="section-heading">
            <p class="eyebrow">Selected Work</p>
            <h2>项目与研究实践</h2>
          </div>
          <div id="project-list" class="project-list"></div>
        </section>

        <section class="section dual-grid">
          <div id="experience" class="panel"></div>
          <div id="skills" class="panel"></div>
        </section>

        <section class="section contact-section" id="contact">
          <div class="section-heading">
            <p class="eyebrow">Contact</p>
            <h2>如果岗位需要快速上手研究与分析，我可以直接进入工作状态</h2>
          </div>
          <div class="contact-card">
            <p id="contact-text"></p>
            <div class="contact-actions">
              <a id="contact-email-link" class="button button-primary" href="#">发送邮件</a>
              <a
                id="contact-secondary-link"
                class="button button-secondary"
                href="#"
                target="_blank"
                rel="noreferrer"
                >查看简历</a
              >
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
