<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>你的名字 | 实习申请个人网站</title>
    <meta
      name="description"
      content="用于实习投递的个人网站，展示个人介绍、项目经历、技能栈与联系方式。"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <nav class="topbar">
          <span class="brand">Portfolio</span>
          <div class="topbar-links">
            <a href="#projects">项目</a>
            <a href="#skills">技能</a>
            <a href="#contact">联系</a>
          </div>
        </nav>

        <div class="hero-grid">
          <section class="hero-copy">
            <p class="eyebrow">面向实习投递</p>
            <h1>你好，我是<span id="hero-name">你的名字</span></h1>
            <p id="hero-summary" class="hero-summary"></p>
            <div class="hero-actions">
              <a id="email-link" class="button button-primary" href="#">邮件联系</a>
              <a id="resume-link" class="button button-secondary" href="#" target="_blank" rel="noreferrer">查看简历</a>
            </div>
            <ul id="hero-metrics" class="metrics"></ul>
          </section>

          <aside class="hero-card">
            <p class="card-label">快速信息</p>
            <div id="quick-facts" class="quick-facts"></div>
          </aside>
        </div>
      </header>

      <main>
        <section class="section intro" id="about">
          <div class="section-heading">
            <p class="eyebrow">About</p>
            <h2>我能为团队带来什么</h2>
          </div>
          <div class="intro-panel">
            <p id="about-text"></p>
          </div>
        </section>

        <section class="section" id="projects">
          <div class="section-heading">
            <p class="eyebrow">Projects</p>
            <h2>代表项目</h2>
          </div>
          <div id="project-list" class="project-list"></div>
        </section>

        <section class="section dual-grid">
          <div id="experience" class="panel"></div>
          <div id="skills" class="panel"></div>
        </section>

        <section class="section contact-section" id="contact">
          <div class="section-heading">
            <p class="eyebrow">Contact</p>
            <h2>下一次投递时，直接把这个链接和邮箱发出去</h2>
          </div>
          <div class="contact-card">
            <p id="contact-text"></p>
            <div class="contact-actions">
              <a id="contact-email-link" class="button button-primary" href="#">发送邮件</a>
              <a id="contact-secondary-link" class="button button-secondary" href="#" target="_blank" rel="noreferrer">查看简历</a>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
